site_name: zata-ops

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

plugins:
  - search
  - git-revision-date-localized:
      fallback_to_build_date: true
      strict: false
      type: date
      locale: zh
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            members_order: source
            show_source: false
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 使用指南:
      - 备份与恢复: guides/backup-and-restore.md
      - 调度示例: guides/scheduling.md
      - VPS 初始化: guides/vps-provisioning.md
      - SSH 隧道: guides/tunnel.md
  - AI 规范:
      - 概览: ai-standards/index.md
      - 架构规范: ai-standards/architecture.md
      - 代码复用规范: ai-standards/code-reuse.md
      - 命名规范: ai-standards/naming.md
      - 注释与 Docstring: ai-standards/comments-docstrings.md
      - 文档规范: ai-standards/documentation.md
      - 测试规范: ai-standards/testing.md
      - 工具与命令: ai-standards/tooling.md

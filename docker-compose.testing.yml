# -----------------------------------------------------------------------------
# Docker Compose — Local Testing Middleware
# -----------------------------------------------------------------------------
# 独立于项目的本地测试中间件，用于模拟外部服务。
# 仅用于本地开发和测试，密码明文写入，不要用于生产环境。
#
# Usage:
#   docker compose -f docker-compose.testing.yml up -d
#   docker compose -f docker-compose.testing.yml down
#
# Connection strings for .env:
#   DATABASE_URL=postgresql+psycopg2://testuser:testpass@localhost:5432/testdb
#   REDIS_URL=redis://:redis123@localhost:6379/0
#   S3_ENDPOINT=http://localhost:9000
#   S3_ACCESS_KEY=minioadmin
#   S3_SECRET_KEY=minioadmin
#   S3_BUCKET=app-backups
#   QDRANT_URL=http://localhost:6333
#   RAGFLOW_BASE_URL=http://localhost:9380
#   RAGFLOW_API_KEY=test-ragflow-key
#
# MinIO 启动后需手动创建 bucket（Console: http://localhost:9001，minioadmin/minioadmin）
# -----------------------------------------------------------------------------


services:
  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible Object Storage
  # ---------------------------------------------------------------------------
  # 用于本地测试 S3 备份 / 文件存储，无需连接 AWS S3。
  # Web Console: http://localhost:9001
  # API Endpoint: http://localhost:9000
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: test-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-test-data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — In-memory Data Store
  # ---------------------------------------------------------------------------
  # 用于本地测试缓存 / 会话 / 任务队列。
  # CLI: redis-cli -h localhost -p 6379
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: test-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 17
  # ---------------------------------------------------------------------------
  # 独立于主项目的测试数据库，避免污染开发库。
  # psql -h localhost -p 5432 -U testuser -d testdb
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: test-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Qdrant — Vector Database
  # ---------------------------------------------------------------------------
  # 用于本地测试向量检索 / RAG / 语义搜索。
  # REST API: http://localhost:6333
  # gRPC: localhost:6334
  # Dashboard: http://localhost:6333/dashboard
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: test-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-test-data:/qdrant/storage
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MySQL 8 — RAGflow 元数据后端（内部依赖）
  # ---------------------------------------------------------------------------
  # RAGflow 硬依赖：默认连 service name `mysql:3306`。
  # 只为 RAGflow 服务，端口不暴露给 app（app 不直连）。
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test-ragflow-pass
      MYSQL_DATABASE: rag_flow
    volumes:
      - mysql-test-data:/var/lib/mysql
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Infinity — RAGflow 向量 / 全文检索后端（内部依赖）
  # ---------------------------------------------------------------------------
  # RAGflow 硬依赖：默认连 service name `infinity:9000`。
  # 只为 RAGflow 服务，端口不暴露给 app。
  # ---------------------------------------------------------------------------
  infinity:
    image: infiniflow/infinity:latest
    container_name: test-infinity
    volumes:
      - infinity-test-data:/var/lib/infinity
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # RAGflow — RAG Pipeline Service
  # ---------------------------------------------------------------------------
  # 用于本地测试 RAGflow 作为第二个检索引擎。
  # REST API: http://localhost:9380
  #
  # 适配说明（与生产 deploy/ragflow 差异）：
  #   - 明文 env，测试用 API key 直接 inline（生产请用 app.env + secrets）
  #   - 端口直接暴露到 localhost，不挂 external Traefik
  #   - 无 deploy.resources 限制
  #
  # 依赖（已在本 compose 内就绪）：
  #   - MySQL        → service `mysql`     （元数据）
  #   - Infinity     → service `infinity`  （向量 / BM25）
  #   - Redis        → service `redis`     （缓存）
  #   - MinIO        → service `minio`     （原始文件）
  # 启动顺序：mysql / infinity / redis / minio 先 up，RAGflow 会等它们就绪后初始化。
  # ---------------------------------------------------------------------------
  ragflow:
    image: infiniflow/ragflow:latest
    container_name: test-ragflow
    ports:
      - "9380:9380"
    environment:
      RAGFLOW_API_KEY: test-ragflow-key
    volumes:
      - ragflow-test-data:/ragflow/data
    restart: unless-stopped

volumes:
  minio-test-data:
  postgres-test-data:
  qdrant-test-data:
  ragflow-test-data:
  mysql-test-data:
  infinity-test-data:

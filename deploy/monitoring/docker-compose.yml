# -----------------------------------------------------------------------------
# Docker Compose — Vector + Loki + Prometheus + Grafana
# -----------------------------------------------------------------------------
# This stack is consumed by `zata-ops env provision --profile vps-traefik --with-monitoring`.
# It can also be started manually on any Docker host:
#   cd deploy/monitoring
#   docker compose up -d
#
# Assumptions:
#   - The host already runs Traefik on the external `traefik` network.
#   - Downstream application containers expose JSON logs on stdout and
#     a `/metrics` endpoint for Prometheus.
# -----------------------------------------------------------------------------

services:
  vector:
    image: timberio/vector:0.45.0-distroless-libc
    command: ["--config", "/etc/vector/vector.yaml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
    networks:
      - monitoring
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - monitoring
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.${DOMAIN}}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
      - traefik
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.middlewares.grafana-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.grafana-web.rule=Host(`grafana.${DOMAIN:?Set DOMAIN in .env}`)"
      - "traefik.http.routers.grafana-web.entrypoints=web"
      - "traefik.http.routers.grafana-web.middlewares=grafana-https-redirect"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:?Set DOMAIN in .env}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    internal: true
  traefik:
    name: ${TRAEFIK_NETWORK:-traefik}
    external: true

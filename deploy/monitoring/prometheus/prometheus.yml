# -----------------------------------------------------------------------------
# Prometheus scrape configuration.
# -----------------------------------------------------------------------------

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "vector"
    static_configs:
      - targets: ["vector:8686"]

  - job_name: "zata-codes-template-backend"
    static_configs:
      - targets: ["zata-codes-template-backend:8000"]
    metrics_path: /metrics
